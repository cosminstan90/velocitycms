# nginx/cloudpanel-rate-limits.conf
#
# PURPOSE: Defines rate-limiting zones at the http{} level.
#          These must live OUTSIDE the server{} block.
#
# INSTALL: Copy this file to /etc/nginx/conf.d/velocitycms-rate-limits.conf
#          on your CloudPanel VPS, then reload nginx:
#
#   sudo cp /path/to/repo/nginx/cloudpanel-rate-limits.conf \
#           /etc/nginx/conf.d/velocitycms-rate-limits.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# NOTE: CloudPanel's nginx already includes /etc/nginx/conf.d/*.conf,
#       so this file will be picked up automatically.

# General browsing — 200 requests/min per IP
limit_req_zone $binary_remote_addr zone=vcms_general:10m rate=200r/m;

# API endpoints — 60 requests/min per IP
limit_req_zone $binary_remote_addr zone=vcms_api:10m     rate=60r/m;

# Auth endpoints — 5 requests/min per IP (brute-force protection)
limit_req_zone $binary_remote_addr zone=vcms_auth:10m    rate=5r/m;
