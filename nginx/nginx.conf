# nginx/nginx.conf — Velocity CMS production reverse proxy
#
# Replace YOUR_DOMAIN.com with your actual domain throughout this file.
# SSL certificates are managed by certbot (Let's Encrypt).

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 25m;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    # General: 200 req/min per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=200r/m;
    # API: tighter burst control
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    # Auth: very tight — prevents brute force
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream nextjs {
        server nextjs:3000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # ACME challenge (certbot webroot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

        # ── SSL ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.com/privkey.pem;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Proxy common settings ─────────────────────────────────────────────
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;

        # ── Next.js static assets — immutable, cache 1 year ──────────────────
        location /_next/static/ {
            proxy_pass http://nextjs;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # ── Next.js image optimization ─────────────────────────────────────────
        location /_next/image {
            proxy_pass http://nextjs;
            add_header Cache-Control "public, max-age=86400";
        }

        # ── Uploaded media — cache 24h ────────────────────────────────────────
        location /media/ {
            proxy_pass http://nextjs;
            add_header Cache-Control "public, max-age=86400";
            # WebP: browsers that support it get it natively (Next.js handles conversion)
            add_header Vary Accept;
            access_log off;
        }

        # ── Auth endpoints — strict rate limit ────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://nextjs;
        }

        # ── API endpoints — moderate rate limit ───────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://nextjs;
        }

        # ── All other routes — general rate limit ─────────────────────────────
        location / {
            limit_req zone=general burst=50 nodelay;
            limit_req_status 429;
            proxy_pass http://nextjs;
        }
    }
}
