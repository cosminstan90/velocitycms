# nginx/cloudpanel-vhost-directives.conf
#
# PURPOSE: Custom nginx directives for the divet.ro site in CloudPanel.
#
# INSTALL:
#   CloudPanel UI → Sites → divet.ro → Nginx Directives tab
#   Paste the entire contents of this file and click "Save".
#
# PREREQUISITE: /etc/nginx/conf.d/velocitycms-rate-limits.conf must exist
#               (see cloudpanel-rate-limits.conf) so the vcms_* zones are defined.

# ── Proxy settings ────────────────────────────────────────────────────────────
proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection 'upgrade';
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_cache_bypass $http_upgrade;
proxy_read_timeout 60s;
client_max_body_size 25m;

# ── Security headers ──────────────────────────────────────────────────────────
add_header X-Frame-Options DENY always;
add_header X-Content-Type-Options nosniff always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# ── Next.js static assets — immutable cache (1 year) ──────────────────────────
location /_next/static/ {
    proxy_pass http://127.0.0.1:3000;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

# ── Next.js image optimisation ─────────────────────────────────────────────────
location /_next/image {
    proxy_pass http://127.0.0.1:3000;
    add_header Cache-Control "public, max-age=86400";
}

# ── Uploaded media — 24h cache ────────────────────────────────────────────────
location /media/ {
    proxy_pass http://127.0.0.1:3000;
    add_header Cache-Control "public, max-age=86400";
    add_header Vary Accept;
    access_log off;
}

# ── Auth endpoints — strict rate limit ────────────────────────────────────────
location /api/auth/ {
    limit_req zone=vcms_auth burst=3 nodelay;
    limit_req_status 429;
    proxy_pass http://127.0.0.1:3000;
}

# ── API endpoints — moderate rate limit ───────────────────────────────────────
location /api/ {
    limit_req zone=vcms_api burst=20 nodelay;
    limit_req_status 429;
    proxy_pass http://127.0.0.1:3000;
}

# ── All other routes — general rate limit ─────────────────────────────────────
location / {
    limit_req zone=vcms_general burst=50 nodelay;
    limit_req_status 429;
    proxy_pass http://127.0.0.1:3000;
}
