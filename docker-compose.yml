services:
  postgres:
    image: postgres:16
    container_name: velocitycms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: velocitycms
      POSTGRES_USER: cms_user
      POSTGRES_PASSWORD: cms_pass
      POSTGRES_MULTIPLE_DATABASES: velocitycms,umami
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms_user -d velocitycms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: velocitycms_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: velocitycms_umami
    environment:
      DATABASE_URL: postgresql://cms_user:cms_pass@postgres:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: umami-app-secret-change-me
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: node node_modules/prisma/build/index.js migrate deploy
    environment:
      DATABASE_URL: postgresql://cms_user:cms_pass@postgres:5432/velocitycms
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
    restart: "no"

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: velocitycms_app
    environment:
      DATABASE_URL: postgresql://cms_user:cms_pass@postgres:5432/velocitycms
      REDIS_URL: redis://redis:6379
    volumes:
      - media_uploads:/app/public/media/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  media_uploads:
