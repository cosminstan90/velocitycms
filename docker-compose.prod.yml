# docker-compose.prod.yml — production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file overrides the base docker-compose.yml with production-specific settings:
#  - nextjs: built from Dockerfile (multi-stage), no port exposure (nginx handles it)
#  - nginx:  reverse proxy with gzip, static asset caching, HTTP/2
#  - certbot: Let's Encrypt SSL certificate management
#  - All services: restart: always

version: '3.8'

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    restart: always
    # Remove external port exposure in production — only accessible within Docker network
    ports: []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    restart: always
    ports: []
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ── Umami analytics ─────────────────────────────────────────────────────────
  umami:
    restart: always

  # ── Next.js app ─────────────────────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    image: velocitycms:latest
    restart: always
    # Don't expose port directly — nginx reverse-proxies to this container
    ports: []
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-cms_user}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-velocitycms}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
    env_file:
      - .env.prod
    volumes:
      - media_uploads:/app/public/media/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Nginx reverse proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: velocitycms_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
      - media_uploads:/var/www/media:ro
    depends_on:
      nextjs:
        condition: service_healthy

  # ── Certbot (Let's Encrypt) ──────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: velocitycms_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Run once and exit — use a cron job or entrypoint hook for renewal
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"

volumes:
  media_uploads:
  certbot_www:
  certbot_conf:
